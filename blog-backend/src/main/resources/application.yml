spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blogsystem?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 3s
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Redis 已启用（本地 localhost:6379）
# RabbitMQ 自动配置已排除，如需启用请删除上面的 exclude：
#  rabbitmq:
#    host: localhost
#    port: 5672
#    username: guest
#    password: guest

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

  servlet:
    multipart:
      max-file-size: 2MB
      max-request-size: 2MB

server:
  port: 8080

app:
  upload:
    dir: uploads
  sensitive-words: 暴力,色情,赌博,毒品,诈骗
  jwt:
    secret: blog-system-secret-key-min-256-bits-long!!
    expiration: 86400000
