spring:
  datasource:
    url: jdbc:mysql://localhost:3306/blogsystem?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
  cache:
    type: simple
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# 本地没有 Redis/RabbitMQ 时已做降级：
#   - 缓存使用内存版 (type: simple)
#   - RabbitMQ 自动配置已排除
# 如果需要启用 Redis，取消下面注释并把 cache.type 改为 redis：
#  data:
#    redis:
#      host: localhost
#      port: 6379
#      timeout: 3s
# 如果需要启用 RabbitMQ，删除上面的 autoconfigure.exclude 并取消下面注释：
#  rabbitmq:
#    host: localhost
#    port: 5672
#    username: guest
#    password: guest

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

server:
  port: 8080

app:
  sensitive-words: 暴力,色情,赌博,毒品,诈骗
  jwt:
    secret: blog-system-secret-key-min-256-bits-long!!
    expiration: 86400000
